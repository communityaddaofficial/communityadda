<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — CommunityAdda Registrations</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="shortcut icon" href="favicon.ico">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f7f9fc; color: #1a1a2e; }
  :root { --navy:#1a2b5e; --orange:#e85d1e; --green:#2e7d32; --gold:#f4a800; --light-bg:#f7f9fc; --muted:#5f6780; }

  .topbar { background:var(--navy); color:#fff; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
  .topbar h1 { font-size:18px; font-weight:700; }
  .topbar button { background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.25); padding:8px 16px; border-radius:6px; font-size:13px; cursor:pointer; }

  .login-screen { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-box { background:#fff; border:1px solid #e4e8f0; border-radius:16px; padding:36px 32px; max-width:380px; width:100%; box-shadow:0 8px 28px rgba(26,43,94,0.08); }
  .login-box h2 { font-size:20px; font-weight:800; color:var(--navy); margin-bottom:8px; }
  .login-box p { font-size:13px; color:var(--muted); margin-bottom:20px; }
  .login-box input { width:100%; padding:12px 14px; border:1.5px solid #d0d7e8; border-radius:8px; font-size:14px; outline:none; margin-bottom:14px; font-family:inherit; }
  .login-box input:focus { border-color:var(--orange); }
  .login-box button { width:100%; background:var(--orange); color:#fff; border:none; padding:13px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }
  .error-text { color:#b3261e; font-size:13px; margin-top:10px; display:none; }

  .dashboard { display:none; padding:28px; max-width:1200px; margin:0 auto; }
  .dash-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
  .dash-header h2 { font-size:22px; font-weight:800; color:var(--navy); }
  .dash-stats { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; }
  .stat-box { background:#fff; border:1px solid #e4e8f0; border-radius:12px; padding:16px 22px; min-width:140px; }
  .stat-box .num { font-size:24px; font-weight:800; color:var(--orange); }
  .stat-box .label { font-size:12px; color:var(--muted); margin-top:2px; }

  .table-wrap { background:#fff; border:1px solid #e4e8f0; border-radius:12px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; min-width:900px; }
  th { text-align:left; padding:12px 16px; background:var(--light-bg); color:var(--navy); font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; border-bottom:1px solid #e4e8f0; }
  td { padding:12px 16px; border-bottom:1px solid #eef1f7; color:#333; white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fafbfd; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .loading-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .refresh-btn { background:var(--navy); color:#fff; border:none; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
  .download-btn { background:var(--green); color:#fff; border:none; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }

  @media (max-width: 640px) {
    .dashboard { padding:16px; }
    .dash-header { flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>CommunityAdda — Admin</h1>
  <button id="logoutBtn" style="display:none" onclick="logout()">Log out</button>
</div>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Admin Login</h2>
    <p>Enter the admin password to view seller registrations.</p>
    <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter') login()" />
    <button onclick="login()">Log In</button>
    <div class="error-text" id="loginError">Incorrect password. Please try again.</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <h2>Seller Registrations</h2>
    <div style="display:flex; gap:10px;">
      <button class="refresh-btn" onclick="loadRegistrations()">Refresh</button>
      <button class="download-btn" onclick="downloadCSV()">Download CSV</button>
    </div>
  </div>

  <div class="dash-stats" id="dashStats"></div>

  <div class="table-wrap">
    <div id="tableContent" class="loading-state">Loading registrations...</div>
  </div>
</div>

<script>
  var currentPassword = '';
  var currentData = [];

  function login() {
    var pw = document.getElementById('passwordInput').value;
    if (!pw) return;
    currentPassword = pw;
    loadRegistrations(true);
  }

  function logout() {
    currentPassword = '';
    currentData = [];
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  async function loadRegistrations(isLoginAttempt) {
    var errorBox = document.getElementById('loginError');
    var tableContent = document.getElementById('tableContent');
    errorBox.style.display = 'none';

    if (isLoginAttempt) {
      tableContent.innerHTML = '';
      tableContent.className = 'loading-state';
      tableContent.textContent = 'Loading registrations...';
    }

    try {
      var response = await fetch('/api/admin-registrations', {
        headers: { 'Authorization': currentPassword }
      });

      if (response.status === 401) {
        if (isLoginAttempt) {
          errorBox.style.display = 'block';
        } else {
          logout();
        }
        return;
      }

      var result = await response.json();

      if (!response.ok) {
        tableContent.textContent = result.error || 'Failed to load data.';
        return;
      }

      currentData = result.registrations || [];

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'inline-block';

      renderStats(currentData);
      renderTable(currentData);
    } catch (err) {
      tableContent.textContent = 'Network error. Please try again.';
    }
  }

  function renderStats(data) {
    var statsBox = document.getElementById('dashStats');
    var total = data.length;
    var today = new Date().toDateString();
    var todayCount = data.filter(function (r) {
      return new Date(r.created_at).toDateString() === today;
    }).length;

    statsBox.innerHTML =
      '<div class="stat-box"><div class="num">' + total + '</div><div class="label">Total Registrations</div></div>' +
      '<div class="stat-box"><div class="num">' + todayCount + '</div><div class="label">Registered Today</div></div>';
  }

  function renderTable(data) {
    var tableContent = document.getElementById('tableContent');

    if (data.length === 0) {
      tableContent.className = 'empty-state';
      tableContent.textContent = 'No registrations yet.';
      return;
    }

    tableContent.className = '';
    var html = '<table><thead><tr>' +
      '<th>Date</th><th>First Name</th><th>Last Name</th><th>Mobile</th><th>Email</th>' +
      '<th>Business Name</th><th>Category</th><th>District</th>' +
      '</tr></thead><tbody>';

    data.forEach(function (r) {
      var date = new Date(r.created_at).toLocaleString();
      html += '<tr>' +
        '<td>' + escapeHtml(date) + '</td>' +
        '<td>' + escapeHtml(r.first_name) + '</td>' +
        '<td>' + escapeHtml(r.last_name) + '</td>' +
        '<td>' + escapeHtml(r.mobile) + '</td>' +
        '<td>' + escapeHtml(r.email || '—') + '</td>' +
        '<td>' + escapeHtml(r.business_name || '—') + '</td>' +
        '<td>' + escapeHtml(r.seller_category || '—') + '</td>' +
        '<td>' + escapeHtml(r.district || '—') + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    tableContent.innerHTML = html;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function downloadCSV() {
    if (currentData.length === 0) return;

    var headers = ['Date', 'First Name', 'Last Name', 'Mobile', 'Email', 'Business Name', 'Category', 'District'];
    var rows = currentData.map(function (r) {
      return [
        new Date(r.created_at).toLocaleString(),
        r.first_name, r.last_name, r.mobile, r.email || '',
        r.business_name || '', r.seller_category || '', r.district || ''
      ].map(function (v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(',');
    });

    var csv = headers.join(',') + '\n' + rows.join('\n');
    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'communityadda-registrations.csv';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
